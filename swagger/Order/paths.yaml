paths:
  /orders:
    get:
      summary: Get orders for the authenticated user
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of user orders
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
    post:
      summary: Create a new order from cart or specific items
      tags:
        - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Order created

  /orders/active:
    get:
      summary: Get currently active orders (PROCESSING, SHIPPED)
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of active orders

  /orders/{id}:
    get:
      summary: Get details of a specific order
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Order'

  /orders/{id}/cancel:
    post:
      summary: Cancel an order
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order cancelled

  /orders/{id}/confirm-payment:
    post:
      summary: Confirm payment for an order
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment confirmed

  /orders/{id}/status:
    put:
      summary: Update order status (Admin only)
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdateRequest'
      responses:
        '200':
          description: Status updated

  /cart:
    get:
      summary: Get authenticated user's cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart retrieved
    delete:
      summary: Clear authenticated user's cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart cleared

  /cart/items:
    post:
      summary: Add an item to the cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Cart item added

  /cart/items/{id}:
    put:
      summary: Update a cart item
      tags:
        - Cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cart item updated
    delete:
      summary: Remove an item from the cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cart item removed

  /wholesale-orders:
    get:
      summary: Get wholesale orders for the authenticated customer
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wholesale orders retrieved
    post:
      summary: Create a wholesale order
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Wholesale order created

  /wholesale-orders/{id}:
    get:
      summary: Get wholesale order by ID
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Wholesale order retrieved

  /wholesale-orders/{id}/status:
    put:
      summary: Update wholesale order status
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Wholesale order status updated
