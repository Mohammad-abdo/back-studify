paths:
  /delivery/profile:
    get:
      summary: Get delivery profile data
      tags:
        - Delivery
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Delivery'
    put:
      summary: Update delivery profile details
      tags:
        - Delivery
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryProfileUpdateRequest'
      responses:
        '200':
          description: Profile updated

  /delivery/status:
    put:
      summary: Update availability status
      tags:
        - Delivery
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryStatusUpdateRequest'
      responses:
        '200':
          description: Status updated

  /delivery/assignments:
    get:
      summary: Get active and past delivery assignments
      tags:
        - Delivery
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of assignments

  /delivery/orders/{orderId}/pickup:
    post:
      summary: Mark an order as picked up
      tags:
        - Delivery
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order marked as picked up

  /delivery/orders/{orderId}/deliver:
    post:
      summary: Mark an order as delivered
      tags:
        - Delivery
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order marked as delivered

  /delivery/location:
    post:
      summary: Update real-time GPS location
      tags:
        - Delivery
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryLocationUpdateRequest'
      responses:
        '200':
          description: Location updated

  /delivery/wallet:
    get:
      summary: Get delivery agent wallet balance
      tags:
        - Delivery
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wallet data
