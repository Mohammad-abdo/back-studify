components:
  schemas:
    HealthStatusResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Server is running
        timestamp:
          type: string
          format: date-time

    DatabaseHealthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Database connection is healthy
        data:
          type: object
          properties:
            status:
              type: string
              example: connected
            responseTime:
              type: string
              example: 15ms
