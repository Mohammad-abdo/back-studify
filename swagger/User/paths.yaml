paths:
  /users/profile:
    get:
      summary: Get current authenticated user profile
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
    put:
      summary: Update common profile fields
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
      responses:
        '200':
          description: Profile updated
    delete:
      summary: Delete user account
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Account deleted

  /users/profile/image:
    post:
      summary: Upload profile avatar image
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileImageUploadRequest'
      responses:
        '200':
          description: Image uploaded

  /users/student/profile:
    put:
      summary: Update student-specific profile data
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentProfileUpdateRequest'
      responses:
        '200':
          description: Student profile updated

  /users/doctor/profile:
    put:
      summary: Update doctor-specific profile data
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorProfileUpdateRequest'
      responses:
        '200':
          description: Doctor profile updated

  /students:
    get:
      summary: List students
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Students retrieved

  /students/{id}:
    get:
      summary: Get student by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Student retrieved
    put:
      summary: Update student by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Student updated
    delete:
      summary: Delete student by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Student deleted

  /doctors:
    get:
      summary: List doctors
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Doctors retrieved

  /doctors/{id}:
    get:
      summary: Get doctor by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Doctor retrieved
    put:
      summary: Update doctor by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Doctor updated
    delete:
      summary: Delete doctor by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Doctor deleted

  /customers:
    get:
      summary: List customers
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Customers retrieved

  /customers/{id}:
    get:
      summary: Get customer by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer retrieved
    put:
      summary: Update customer by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer updated
    delete:
      summary: Delete customer by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Customer deleted
