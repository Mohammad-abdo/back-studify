    get:
      summary: List book categories
      tags: [System]
      responses:
        '200':
          description: Book categories retrieved
    post:
      summary: Create book category
      tags: [System]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Book category created

  /categories/books/{id}:
    put:
      summary: Update book category
      tags: [System]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Book category updated
    delete:
      summary: Delete book category
      tags: [System]
      security:
