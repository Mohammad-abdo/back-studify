paths:
  /materials:
    get:
      summary: List materials
      tags: [Content]
      responses:
        '200':
          description: Materials retrieved
    post:
      summary: Create a material
      tags: [Content]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Material created

  /materials/{id}:
    get:
      summary: Get material by ID
      tags: [Content]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Material retrieved
    put:
      summary: Update material by ID
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Material updated
    delete:
      summary: Delete material by ID
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Material deleted

  /materials/{id}/download:
    post:
      summary: Increment material download count
      tags: [Content]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Material download recorded

  /materials/{id}/pricing:
    post:
      summary: Add pricing to a material
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201':
          description: Material pricing added

  /book-pricing:
    get:
      summary: List book pricing rows
      tags: [Content]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Book pricing rows retrieved
    post:
      summary: Create a book pricing row
      tags: [Content]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Book pricing row created

  /book-pricing/{id}:
    get:
      summary: Get book pricing by ID
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Book pricing retrieved
    put:
      summary: Update book pricing by ID
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Book pricing updated
    delete:
      summary: Delete book pricing by ID
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Book pricing deleted

  /reviews:
    get:
      summary: List reviews by target
      tags: [Content]
      responses:
        '200':
          description: Reviews retrieved
    post:
      summary: Create a review
      tags: [Content]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Review created

  /reviews/{id}:
    put:
      summary: Update a review
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Review updated
    delete:
      summary: Delete a review
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Review deleted
